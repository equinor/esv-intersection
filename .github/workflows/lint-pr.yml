name: Lint Pull Request

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions: {}

jobs:
  lint-pr:
    name: Lint PR Title
    permissions:
      contents: read
    uses: equinor/ops-actions/.github/workflows/commitlint.yml@792c28d178029e9d2b5ae027e3acbe18da89e9ed # 9.38.2
    with:
      message: ${{ github.event.pull_request.title }}