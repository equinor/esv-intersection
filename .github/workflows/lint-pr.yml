name: Lint Pull Request

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions: {}

jobs:
  lint-pr:
    name: Lint PR Title
    permissions:
      contents: read
    uses: equinor/ops-actions/.github/workflows/commitlint.yml@e5aa8af4951a0bee6403409c065bb310296bdef6 # 9.37.0
    with:
      message: ${{ github.event.pull_request.title }}