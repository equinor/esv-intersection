name: Lint Pull Request

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions: {}

jobs:
  lint-pr:
    name: Lint PR Title
    permissions:
      contents: read
    uses: equinor/ops-actions/.github/workflows/commitlint.yml@bd92a1ff6b435a04480a0b72d29672fc422528f4 # 9.39.0
    with:
      message: ${{ github.event.pull_request.title }}