name: Lint Pull Request

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions: {}

jobs:
  lint-pr:
    name: Lint PR Title
    permissions:
      contents: read
    uses: equinor/ops-actions/.github/workflows/commitlint.yml@8c9c3b94821100c8101be18193ad8136c24c6167 # 9.38.3
    with:
      message: ${{ github.event.pull_request.title }}