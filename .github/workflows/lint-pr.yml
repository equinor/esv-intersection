name: Lint Pull Request

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions: {}

jobs:
  lint-pr:
    name: Lint PR Title
    permissions:
      contents: read
    uses: equinor/ops-actions/.github/workflows/commitlint.yml@e8dfd5776985e7d74c93787841b1a1b830d80175 # 9.39.1
    with:
      message: ${{ github.event.pull_request.title }}