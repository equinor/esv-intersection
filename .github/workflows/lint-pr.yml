name: Lint Pull Request

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions: {}

jobs:
  lint-pr:
    name: Lint PR Title
    permissions:
      contents: read
    uses: equinor/ops-actions/.github/workflows/commitlint.yml@ecbe5190dbfb866ebd36d850cd68e01b873f969c # 9.35.1
    with:
      message: ${{ github.event.pull_request.title }}