name: Lint Pull Request

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions: {}

jobs:
  lint-pr:
    name: Lint PR Title
    permissions:
      contents: read
    uses: equinor/ops-actions/.github/workflows/commitlint.yml@492516f19214a297c5f9ba6526bedb2a42c775d1 # 9.38.1
    with:
      message: ${{ github.event.pull_request.title }}