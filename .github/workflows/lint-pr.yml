name: Lint Pull Request

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions: {}

jobs:
  lint-pr:
    name: Lint PR Title
    permissions:
      contents: read
    uses: equinor/ops-actions/.github/workflows/commitlint.yml@c1be86e02c64b0d2db5c2dba532b5580cdce168d # 9.38.0
    with:
      message: ${{ github.event.pull_request.title }}